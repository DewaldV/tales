<article>
	<h2><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
	<time>{{ .Date.Format (default "2006-01-02" .Site.Params.dateFmt) }}</time>
	<div class="tags">
		{{ range .Params.tags }}
		<a href="{{ "/tags/" | relLangURL }}{{ . | urlize }}">#{{ . }}</a>
		{{ end }}
	</div>
	<div>
		{{ .Summary }}
		{{ if .Truncated }}
			<a href="{{ .Permalink }}">Read more...</a>
		{{ end }}
	</div>
</article>
