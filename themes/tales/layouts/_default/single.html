{{ define "main" }}
	<main>
		<article>
			<h1>{{ .Title }}</h1>
			<time>{{ .Date.Format (default "2006-01-02" .Site.Params.dateFmt) }}</time>
			<div class="tags">
				{{ range .Params.tags }}
				<a href="{{ "/tags/" | relLangURL }}{{ . | urlize }}">#{{ . }}</a>
				{{ end }}
			</div>

			<div>
				{{ .Content }}
			</div>
		</article>
	</main>
{{ end }}
